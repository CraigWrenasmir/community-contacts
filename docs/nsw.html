<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NSW Community Contacts Radius Search</title>
  <link rel="stylesheet" href="./state.css" />
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="topnav"><a href="./index.html">Back to Community Contacts</a></div>
      <h1 id="pageTitle"></h1>
      <p id="pageSub" class="sub"></p>
      <div id="datasetStats" class="stats" aria-live="polite"></div>
      <div class="row">
        <input id="location" placeholder="e.g. postcode or suburb" />
        <select id="category">
          <option value="all" selected>All Categories</option>
        </select>
        <select id="radius">
          <option value="5">5 km</option>
          <option value="10">10 km</option>
          <option value="20">20 km</option>
          <option value="50" selected>50 km</option>
          <option value="100">100 km</option>
        </select>
        <button id="searchBtn">Search</button>
        <button id="clearBtn" type="button" class="btn-toggle">Reset</button>
        <button id="copyBtn" type="button" disabled>Copy Emails</button>
      </div>
      <div class="row row-secondary">
        <label class="check">
          <input id="emailOnly" type="checkbox" />
          <span>Email only</span>
        </label>
      </div>
      <div id="meta" class="meta"></div>
      <div id="copyMeta" class="meta"></div>
      <div id="error" class="err"></div>
      <div style="overflow:auto;">
        <table id="results" hidden>
          <thead>
            <tr>
              <th>Organisation</th>
              <th>Category</th>
              <th>Suburb</th>
              <th>Postcode</th>
              <th>Distance (km)</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Address</th>
              <th>Links</th>
              <th>Relevance</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    window.STATE_CODE = "nsw";
    window.STATE_NAME = "New South Wales";
  </script>
  <script src="./js/community-search.js"></script>
</body>
</html>
